name: Bug Report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the shortest path to reproduce the issue.
      placeholder: |
        1. Start the server
        2. Open the app
        3. Tap ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Server
        - iOS
        - CI
        - Documentation
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit Or Version
      description: Paste the commit hash, tag, or branch if known.
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      render: shell
